name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  test:
    name: Test Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x, 20.x]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests (if they exist)
        run: |
          if [ -f "test.js" ] || [ -f "test/index.js" ] || [ -d "test" ] && [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "⚠️ No tests found, skipping..."
          fi
        env:
          CI: true

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm install
      
      - name: Get package version
        run: |
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      
      - name: Build package (if needed)
        run: |
          if [ -f "build.js" ]; then node build.js; fi
          if grep -q '"build"' package.json; then npm run build; fi
        continue-on-error: true
      
      - name: Verify package contents
        run: |
          echo "📦 Package contents:"
          npm pack --dry-run
      
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release
        if: github.event_name == 'release'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          release_name: Release v${{ env.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          body: |
            ## 🚀 Release v${{ env.PACKAGE_VERSION }}
            
            ### Installation
            ```bash
            npm install modern-load@${{ env.PACKAGE_VERSION }}
            ```
            
            ### Changelog
            - See [CHANGELOG.md](CHANGELOG.md) for details
            
            ### Full Commits
            ${{ github.event.head_commit.url || github.event.compare }}
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Successfully published modern-load@${{ env.PACKAGE_VERSION }}"
          echo "📦 View package: https://www.npmjs.com/package/modern-load"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Failed to publish package"
          exit 1

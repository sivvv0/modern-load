name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  test:
    name: Test Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]  # Only test on Node.js 24
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests (if they exist)
        run: |
          if [ -f "test.js" ] || [ -f "test/index.js" ] || [ -d "test" ] && [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "⚠️ No tests found, skipping..."
          fi
        env:
          CI: true
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm install
      
      - name: Get package version
        run: |
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Create GitHub Release
        if: github.event_name == 'release'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          release_name: Release v${{ env.PACKAGE_VERSION }}
          draft: false
          prerelease: false
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Successfully published modern-load@${{ env.PACKAGE_VERSION }}"
          echo "📦 View package: https://www.npmjs.com/package/modern-load"
